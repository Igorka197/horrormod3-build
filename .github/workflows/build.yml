name: Build Fabric Mod

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build Mod
        run: |
                   curl -L https://github.com/FabricMC/fabric-example-mod/archive/refs/tags/1.20.1.zip -o mod.zip
          unzip mod.zip
          cp -r fabric-example-mod-1.20.1/. .
          rm -rf fabric-example-mod-1.20.1 mod.zip
          chmod +x gradlew
          ./gradlew build
      - uses: actions/upload-artifact@v4
        with:
          name: horrormod-jar
          path: build/libs/*.jar
